version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mastermind-db
    environment:
      POSTGRES_USER: mastermind_user
      POSTGRES_PASSWORD: mastermind_password
      POSTGRES_DB: mastermind_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  